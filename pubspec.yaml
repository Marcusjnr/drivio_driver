name: drivio_driver
description: Drivio Driver — marketplace driver app.
publish_to: 'none'
version: 1.0.0+4

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  get_it: ^7.7.0
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.2.1
  intl: ^0.20.2
  shared_preferences: ^2.3.2
  supabase_flutter: ^2.12.4
  uuid: ^4.5.1
  flutter_dotenv: ^6.0.1
  image_picker: ^1.1.2
  file_picker: ^11.0.2
  path: ^1.9.0
  mime: ^1.0.6
  geolocator: ^13.0.2
  maplibre_gl: ^0.26.1
  url_launcher: ^6.3.1
  flutter_custom_tabs: ^2.4.0
  logger: ^2.4.0
  shimmer: ^3.0.0
  firebase_core: ^4.7.0
  firebase_messaging: ^16.1.0
  flutter_local_notifications: ^18.0.1
  # Voice calls (Phase C): Agora media + native incoming-call UI.
  agora_rtc_engine: ^6.5.2
  flutter_callkit_incoming: ^2.5.2
  audioplayers: ^6.1.0
  flutter_foreground_task: ^8.17.0
  http: ^1.2.2
  webview_flutter: ^4.13.0
  facial_liveness_verification: ^2.1.0
  camera: ^0.11.2
  permission_handler: ^12.0.1
  mixpanel_flutter: ^2.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.0
  flutter_flavorizr: ^2.2.3
  flutter_launcher_icons: ^0.14.1

# App launcher icon — driver "D." mark (ivory D + coral steering wheel on
# charcoal-teal). Regenerate after editing the source images:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/branding/app_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  adaptive_icon_background: "#071919"
  adaptive_icon_foreground: "assets/branding/app_icon_foreground.png"
  min_sdk_android: 21

# Flavor scaffolding (Phase A). Instruction list is deliberately trimmed:
# no flutter:app/pages/main (would overwrite the real main.dart), no
# icon/asset/firebase processors (Firebase lands in Phase B).
flavorizr:
  instructions:
    - android:androidManifest
    - android:buildGradle
    - flutter:flavors
    - flutter:targets
    - ios:xcconfig
    - ios:buildTargets
    - ios:schema
    - ios:plist
  flavors:
    prod:
      app:
        name: "Drivio Driver"
      android:
        applicationId: "com.drivedrivio.drivio_driver"
      ios:
        bundleId: "com.drivedrivio.drivio-driver"
    staging:
      app:
        name: "Drivio Driver Beta"
      android:
        applicationId: "com.drivedrivio.drivio_driver.beta"
      ios:
        bundleId: "com.drivedrivio.drivio-driver.beta"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
    - .env.prod
    - .env.staging
    - assets/images/
    - assets/images/onboarding/
    - assets/audio/
